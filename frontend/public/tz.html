<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Часовой пояс</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon  { font-size: 48px; margin-bottom: 16px; }
    .hint  { font-size: 13px; color: #888; margin-bottom: 10px; }
    .value { font-size: 26px; font-weight: 800; color: #C8FF00; }
  </style>
</head>
<body>
  <div class="icon">🌍</div>
  <div class="hint">Определяем часовой пояс…</div>
  <div class="value" id="tz"></div>

  <script>
    (function () {
      var tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      var offset = -new Date().getTimezoneOffset() / 60;
      var utc    = offset >= 0 ? ('UTC+' + offset) : ('UTC' + offset);

      document.getElementById('tz').textContent = utc;

      setTimeout(function () {
        tg.sendData(utc);
        tg.close();
      }, 700);
    })();
  </script>
</body>
</html>
