server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — никогда не кешировать (всегда свежий, ссылается на актуальный бандл)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # хэшированные ассеты — кешировать вечно (хэш в имени = иммутабельность).
    # CORS header so <script crossorigin> tags get real stack traces instead
    # of a generic "Script error." in window.onerror (see index.html).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # SPA fallback — всё остальное на index.html (включая /telegram-web-app.js
    # и другие статичные файлы из public/, не попавшие под /assets/)
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
