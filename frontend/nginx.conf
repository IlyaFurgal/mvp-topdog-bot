server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — никогда не кешировать (всегда свежий, ссылается на актуальный бандл)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # хэшированные ассеты — кешировать вечно (хэш в имени = иммутабельность)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — всё остальное на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
