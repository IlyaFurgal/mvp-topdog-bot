events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Frontend — topdogmvp.ru / www.topdogmvp.ru ────────
    server {
        listen 80;
        server_name topdogmvp.ru www.topdogmvp.ru _;

        location / {
            proxy_pass         http://frontend:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Local dev: /api/* → FastAPI (used when no subdomain setup)
        location /api/ {
            proxy_pass         http://api:8000/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Telegram webhook → bot (host network mode)
        location /webhook/bot {
            proxy_pass         http://127.0.0.1:8080/webhook/bot;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # ── API subdomain — api.topdogmvp.ru ──────────────────
    server {
        listen 80;
        server_name api.topdogmvp.ru;

        location / {
            proxy_pass         http://api:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
