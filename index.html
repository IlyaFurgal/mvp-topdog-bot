<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MVP by TopDog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ WELCOME SCREEN ════════════════════════════ -->
  <div class="screen" id="welcomeScreen">

    <div class="welcome-bg">
      <div class="welcome-glow"></div>
      <div class="welcome-grid"></div>
    </div>

    <div class="welcome-content">

      <div class="welcome-top">
        <div class="logo-block">
          <div class="logo-badge">
            <span class="logo-mvp-big">MVP</span>
          </div>
          <span class="logo-sub-big">BY TOP DOG</span>
        </div>

        <div class="welcome-divider"></div>

        <h1 class="welcome-title">ТВОЙ<br/>ПЕРСОНАЛЬНЫЙ<br/>ТРЕКЕР</h1>
        <p class="welcome-desc">
          Контроль сна, питания, тренировок и состояния — в одном месте. Система, которая держит тебя в режиме.
        </p>

        <div class="welcome-stats">
          <div class="wstat">
            <span class="wstat-val">24/7</span>
            <span class="wstat-key">МОНИТОРИНГ</span>
          </div>
          <div class="wstat-sep"></div>
          <div class="wstat">
            <span class="wstat-val">4</span>
            <span class="wstat-key">ПАРАМЕТРА</span>
          </div>
          <div class="wstat-sep"></div>
          <div class="wstat">
            <span class="wstat-val">MVP</span>
            <span class="wstat-key">СТАТУС</span>
          </div>
        </div>
      </div>

      <div class="welcome-bottom">
        <button class="cta-btn" onclick="goToChat()">
          <span>ПЕРЕЙТИ В ЧАТ</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="#0f0f0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <p class="welcome-hint">Нажми, чтобы начать сессию</p>
      </div>

    </div>
  </div>

  <!-- ══ CHAT SCREEN ════════════════════════════════ -->
  <div class="screen hidden" id="chatScreen">

    <!-- HEADER -->
    <header class="header">
      <button class="back-btn" onclick="goToWelcome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-center">
        <span class="header-logo-text">MVP</span>
        <div class="header-status">
          <span class="status-dot"></span>
          <span class="status-text">СИСТЕМА АКТИВНА</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-avatar" id="headerAvatar">U</div>
      </div>
    </header>

    <!-- CHAT AREA -->
    <main class="chat-area" id="chatArea">
      <div class="system-msg">СЕССИЯ НАЧАТА · <span id="sessionDate"></span></div>
    </main>

    <!-- INPUT AREA -->
    <footer class="input-area">
      <div class="input-wrap">
        <button class="attach-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="#555" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <input
          type="text"
          id="msgInput"
          class="msg-input"
          placeholder="НАПИСАТЬ..."
          autocomplete="off"
          onkeydown="handleKey(event)"
          oninput="onInputChange()"
        />
        <button class="send-btn" onclick="sendMessage()" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="#0f0f0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#0f0f0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
